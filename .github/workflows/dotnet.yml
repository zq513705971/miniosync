name: .NET 8 Build & Publish

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Determine Version
      id: version
      shell: pwsh
      run: |
        $ref = "${{ github.ref }}"
        if ($ref -match '^refs/tags/v(.+)$') {
          # Tag push: 直接从标签名取版本号, 如 v1.0.1 → 1.0.1
          $ver = $matches[1]
        } else {
          # Branch/PR: 基于 git tag + commit 计数算版本
          $lastTag = & git describe --tags --abbrev=0 2>$null
          if (-not $lastTag) { $lastTag = '0.0.0' }
          $lastTag = $lastTag -replace '^[vV]', ''
          $commitCount = & git rev-list --count "$lastTag..HEAD" 2>$null
          if (-not $commitCount) { $commitCount = 0 }
          $shortSha = (& git rev-parse --short HEAD).Trim()
          $ver = "$lastTag-build.$commitCount+$shortSha"
        }
        Write-Host "Version: $ver"
        "semVer=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Restore NuGet packages
      run: dotnet restore MinioSync.sln

    - name: Publish (self-contained, single-file, win-x64)
      run: .\publish.ps1 -Configuration Release -Version ${{ steps.version.outputs.semVer }}

    - name: Upload build artifacts (workflow run summary)
      uses: actions/upload-artifact@v4
      with:
        name: MinioSync-Build-${{ steps.version.outputs.semVer }}
        path: deploy/
        if-no-files-found: error

    - name: Report sizes
      shell: pwsh
      run: |
        Get-ChildItem deploy/ -File | Sort-Object Length -Descending | ForEach-Object {
          $sizeMB = [math]::Round($_.Length/1MB, 2)
          "{0,8} MB  {1}" -f $sizeMB, $_.Name
        } | Write-Host

    - name: Package deploy (zip)
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $ver = "${{ steps.version.outputs.semVer }}"
        $zipName = "MinioSync-v$ver.zip"
        Compress-Archive -Path deploy\* -DestinationPath $zipName -CompressionLevel Optimal
        Write-Host "Created: $zipName"
        "RELEASE_ZIP=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ steps.version.outputs.semVer }}
        files: ${{ env.RELEASE_ZIP }}
        generate_release_notes: true
        fail_on_unmatched_files: true
