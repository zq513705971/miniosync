name: .NET Framework Build

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install .NET Framework 4.6.1 targeting pack
      run: choco install netfx-4.6.1-devpack -y

    - name: Restore NuGet packages
      run: nuget restore MinioSync.sln

    - name: Build
      run: msbuild MinioSync.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MinioSync-Build
        path: |
          deploy\*.exe
          deploy\*.dll
          deploy\*.pdb
          deploy\*.config
        if-no-files-found: error
