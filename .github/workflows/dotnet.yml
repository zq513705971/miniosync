name: .NET 8 Build & Publish

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    permissions:
      contents: write    # 创建 Release 需要（仅 tag push 时生效）
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet packages
      run: dotnet restore MinioSync.sln

    - name: Publish (self-contained, single-file, win-x64)
      run: .\publish.ps1 -Configuration Release

    - name: Upload build artifacts (workflow run summary)
      uses: actions/upload-artifact@v4
      with:
        name: MinioSync-Build
        path: deploy/
        if-no-files-found: error

    - name: Report sizes
      shell: pwsh
      run: |
        Get-ChildItem deploy/ -File | Sort-Object Length -Descending | ForEach-Object {
          $sizeMB = [math]::Round($_.Length/1MB, 2)
          "{0,8} MB  {1}" -f $sizeMB, $_.Name
        } | Write-Host

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          deploy/MinioSync.exe
          deploy/SyncWorker.exe
          deploy/FullSync.exe
          deploy/config.json
        generate_release_notes: true
        fail_on_unmatched_files: true
