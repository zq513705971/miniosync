name: .NET 8 Build & Publish

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    # windows-2022 ships with .NET 8 SDK preinstalled, so we only need a
    # Restore+Publish flow. We pin the SDK minor version via global.json later.
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet packages
      run: dotnet restore MinioSync.sln

    - name: Publish (self-contained, single-file, win-x64)
      run: .\publish.ps1 -Configuration Release

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MinioSync-Build
        path: |
          deploy/*.exe
          deploy/*.dll
          deploy/*.json
        if-no-files-found: error

    - name: Report sizes
      shell: pwsh
      run: |
        Get-ChildItem deploy/ -File | Sort-Object Length -Descending | ForEach-Object {
          $sizeMB = [math]::Round($_.Length/1MB, 2)
          "{0,8} MB  {1}" -f $sizeMB, $_.Name
        } | Write-Host
